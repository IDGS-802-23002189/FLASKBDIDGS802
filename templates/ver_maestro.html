{% extends "layout.html" %}
{% block container %}

<div class="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center py-20 px-6">

    <!-- Card principal -->
    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-12 py-10">
            <h2 class="text-3xl font-bold text-white tracking-wide">
                Detalle del Maestro
            </h2>

        </div>

        <!-- Contenedor interno -->
        <div class="px-16 py-16">

            <div class="bg-gray-50 rounded-3xl p-12 shadow-inner space-y-12">

                <!-- Nombre -->
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider">
                        Nombre
                    </label>
                    <div class="w-full h-16 px-6 border border-gray-200 rounded-2xl 
                                flex items-center bg-white text-gray-800 text-lg font-medium shadow-sm">
                        {{ nombre }}
                    </div>
                </div>

                <!-- Apellidos -->
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider">
                        Apellidos
                    </label>
                    <div class="w-full h-16 px-6 border border-gray-200 rounded-2xl 
                                flex items-center bg-white text-gray-800 text-lg font-medium shadow-sm">
                        {{ apellidos }}
                    </div>
                </div>

                <!-- Especialidad -->
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider">
                        Especialidad
                    </label>
                    <div class="w-full h-16 px-6 border border-gray-200 rounded-2xl 
                                flex items-center bg-white text-gray-800 text-lg font-medium shadow-sm">
                        {{ especialidad }}
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider">
                        Email
                    </label>
                    <div class="w-full h-16 px-6 border border-gray-200 rounded-2xl 
                                flex items-center bg-white text-gray-800 text-lg font-medium shadow-sm">
                        {{ email }}
                    </div>
                </div>

            </div>

            <!-- Botón -->
            <div class="flex justify-end pt-12">
                <a href="{{ url_for('maestros_bp.lista_maestros') }}"
                   class="text-white bg-brand box-border border border-transparent 
                   hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium 
                   shadow-xs font-medium leading-5 rounded-full text-sm 
                   px-4 py-2.5 focus:outline-none">
                     Regresar
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}

{% extends "layout.html" %}

{% block container %}

{% import "_macros.html" as macros %}


<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
    <div class="w-full max-w-7xl mx-auto">
        
        <div class="flex items-center justify-between mb-6 px-2">
            <h1 class="text-2xl font-bold text-gray-800">Nuevo</h1>
            
            
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl shadow-xl overflow-hidden">
            <div class="relative overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b border-gray-200">
                        <tr>
                            <th scope="col" class="px-8 py-4 font-bold">Nombre</th>
                            <th scope="col" class="px-8 py-4 font-bold">Apellido</th>
                            <th scope="col" class="px-8 py-4 font-bold">Email</th>
                            <th scope="col" class="px-8 py-4 font-bold text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        {% for alum in alumno %}
                        <tr class="bg-white hover:bg-gray-50 transition-colors">
                            <td class="px-8 py-4 font-medium text-gray-900">{{alum.nombre}}</td>
                            <td class="px-8 py-4">{{alum.apaterno}}</td>
                            <td class="px-8 py-4">{{alum.email}}</td>
                            <td class="px-8 py-4 flex justify-center space-x-2">

    <a href="{{ url_for('modificar', id=alum.id) }}"
   class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-full text-xs px-4 py-2 focus:outline-none">
    Modificar
</a>
    
    <a href="{{ url_for('detalles', id=alum.id) }}"
       class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-full text-xs px-4 py-2 focus:outline-none">
        Detalles
    </a>

</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{%endblock%}
